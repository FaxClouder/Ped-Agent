name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall src scripts tests

      - name: Test
        run: pytest -q

